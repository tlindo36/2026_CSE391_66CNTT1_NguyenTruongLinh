<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài Tập 1 - Flexbox Form</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .form-container {
            background-color: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 600px;
        }
        .form-container h2 {
            text-align: center;
            font-size: 18px;
            margin-bottom: 20px;
            color: #333;
        }
        .contact-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .form-row {
            display: flex;
            gap: 15px;
        }
        .form-row input {
            flex: 1;
        }
        input, textarea {
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
            outline: none;
            width: 100%;
            box-sizing: border-box;
        }
        input:focus, textarea:focus {
            border-color: #007BFF;
        }

        .form-footer {
            display: flex;
            justify-content: space-between;
            align-items: center; 
            margin-top: 5px;
        }
        button {
            background-color: #007BFF;
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 15px;
            transition: background 0.3s;
        }
        button:hover {
            background-color: #0056b3;
        }
        .note {
            font-size: 12px;
            color: #000000;
            margin: 0; 
        }
        /* ----------------------- */
    </style>
</head>
<body>

<div class="form-container">
    <h2>Get in touch with us by filling contact form below</h2>
    <form class="contact-form">
        <div class="form-row">
            <input type="text" placeholder="Enter your full name">
            <input type="email" placeholder="*Enter your email address" required>
        </div>
        <div class="form-row">
            <input type="text" placeholder="Enter your subject">
        </div>
        <div class="form-row">
            <textarea rows="5" placeholder="Your message here..."></textarea>
        </div>
        
        <div class="form-footer">
            <button type="button">Send message</button>
            <div class="note">* Please fill all required form field, thanks!</div>
        </div>
    </form>
</div>

</body>
</html>
